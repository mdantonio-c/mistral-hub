version: "3.9"

services:
  postgres:
    ports:
      - ${ALCHEMY_PORT}:${ALCHEMY_PORT}

  rabbit:
    ports:
      - ${RABBITMQ_PORT}:${RABBITMQ_PORT}
      - ${RABBITMQ_MANAGEMENT_PORT}:${RABBITMQ_MANAGEMENT_PORT}

  nifi:
    ports:
      - 8070:8443
    volumes:
      - ssl_certs:/ssl
    environment:
      ACTIVATE: ${ACTIVATE_NIFI}

      SINGLE_USER_CREDENTIALS_USERNAME: ${NIFI_USERNAME}
      SINGLE_USER_CREDENTIALS_PASSWORD: ${NIFI_PASSWORD}
      NIFI_SECURITY_USER_LOGIN_IDENTITY_PROVIDER: single-user-provider
      NIFI_SECURITY_USER_AUTHORIZER: single-user-authorizer

      NIFI_WEB_PROXY_HOST: ${PROJECT_DOMAIN}:8070
      NIFI_WEB_HTTPS_HOST: 0.0.0.0
      NIFI_WEB_HTTPS_PORT: 8443

      AUTH: tls
      KEYSTORE_PATH: /ssl/keystore.p12
      KEYSTORE_TYPE: PKCS12
      KEYSTORE_PASSWORD: ${NIFI_KEYSTORE_PASSWORD}
      TRUSTSTORE_PATH: /ssl/keystore.p12
      TRUSTSTORE_TYPE: PKCS12
      TRUSTSTORE_PASSWORD: ${NIFI_KEYSTORE_PASSWORD}
      SSL_TRUSTORE_FILENAME: "${SSL_TRUSTORE_FILENAME}"

  proxy:
    restart: always
    image: harbor-ada.hpc.cineca.it/rapydo/proxy:4.0
    hostname: proxy
    logging:
      driver: ${ANALYTICS_LOG_DRIVER:-json-file}
      options:
        fluentd-address: localhost:24224
        tag: nginx
    working_dir: /etc/nginx
    depends_on:
      fluentd:
        condition: service_healthy
    healthcheck:
      test: "wget -t 1 --quiet --no-check-certificate --certificate=/etc/letsencrypt/local_client.crt --private-key=/etc/letsencrypt/local_client.key http://localhost -O - > /dev/null"
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: 10s
      retries: 3
      start_period: 5m
    volumes:
      - ssl_certs:/etc/letsencrypt
      - ${DATA_DIR}/grib_extraction:/nwp
      - ${DATA_DIR}/netcdf_extraction:/nwp/ww3
      - ${DATA_DIR}/seasonal:/nwp/SEASONAL
      - ${DATA_DIR}/catalog:/catalog
      - ${PROJECT_DIR}/nginx/proxy.service:/etc/nginx/sites-enabled/proxy.service
      - ${PROJECT_DIR}/nginx/analytics.service.${ACTIVATE_ANALYTICS:-0}:/etc/nginx/sites-enabled/analytics.service
      - ${PROJECT_DIR}/nginx/custom_maintenance.conf:/etc/nginx/sites-enabled-templates/custom_maintenance.conf
      - ${PROJECT_DIR}/nginx/maintenance.html:/usr/share/nginx/html/maintenance.html
      - ${PROJECT_DIR}/nginx/toggle_maintenance.sh:/etc/nginx/toggle_maintenance.sh
      - ${PROJECT_DIR}/nginx/angular.service:/etc/nginx/sites-enabled-templates/service_confs/angular-production.conf
    networks:
      default:
        aliases:
          - ${PROXY_HOST}
      logging: null
    ports:
      - target: 443
        published: ${PROXY_PROD_PORT}
        protocol: tcp
        # Swarm default is ingress to be load balanced
        # With host the port is directly mapped on the host
        # and prevents nginx to be behind the swarm proxy
        # Cons: nginx is no longer scalable
        # Pro: nginx is able to access the real client IP address,
        # instead of the load balancer IP
        mode: host
      - target: 80
        published: ${PROXY_DEV_PORT}
        protocol: tcp
        mode: host
    environment:
      APP_MODE: ${APP_MODE}
      DOMAIN: "${PROJECT_DOMAIN}"
      DOMAIN_ALIASES: "${DOMAIN_ALIASES}"
      ACTIVATE: ${ACTIVATE_PROXY}
      CURRENT_UID: ${CURRENT_UID}
      CURRENT_GID: ${CURRENT_GID}
      SMTP_ADMIN: "${SMTP_ADMIN}"
      DEFAULT_DHLEN: ${DEFAULT_DHLEN}
      FRONTEND: "${FRONTEND_FRAMEWORK}"
      UNSAFE_EVAL: "${SET_UNSAFE_EVAL}"
      UNSAFE_INLINE: "${SET_UNSAFE_INLINE}"
      STYLE_UNSAFE_INLINE: "${SET_STYLE_UNSAFE_INLINE}"
      CORS_ALLOWED_ORIGIN: "${CORS_ALLOWED_ORIGIN}"
      CSP_SCRIPT_SRC: "${SET_CSP_SCRIPT_SRC}"
      CSP_IMG_SRC: "${SET_CSP_IMG_SRC}"
      CSP_FONT_SRC: "${SET_CSP_FONT_SRC}"
      CSP_CONNECT_SRC: "${SET_CSP_CONNECT_SRC}"
      CSP_FRAME_SRC: "${SET_CSP_FRAME_SRC}"
      SSL_VERIFY_CLIENT: "${SSL_VERIFY_CLIENT}"
      SSL_FORCE_SELF_SIGNED: "${SSL_FORCE_SELF_SIGNED}"
      MAX_REQUESTS_PER_SECOND_AUTH: ${SET_MAX_REQUESTS_PER_SECOND_AUTH}
      MAX_REQUESTS_BURST_AUTH: ${SET_MAX_REQUESTS_BURST_AUTH}
      MAX_REQUESTS_PER_SECOND_API: ${SET_MAX_REQUESTS_PER_SECOND_API}
      MAX_REQUESTS_BURST_API: ${SET_MAX_REQUESTS_BURST_API}
      GA_TRACKING_CODE: "${GA_TRACKING_CODE}"

  ui:
    image: harbor-ada.hpc.cineca.it/meteo-hub-production/meteo-cms-ui:latest-pre

  strapi:
    image: harbor-ada.hpc.cineca.it/meteo-hub-production/meteo-hub-strapi:latest-pre
    # ports:
    # - "1337:1337"

  fluentd:
    build: ${PROJECT_DIR}/builds/fluentd
    image: meteohub/fluentd:${RAPYDO_VERSION}
    environment:
      ACTIVATE: 1
    ports:
      - "24224:24224"
      - "24224:24224/udp"
    volumes:
      - ${DATA_DIR}/logs/fluentd:/var/log/fluentd # 👈 mount host dir
    networks:
      - logging
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "24224"]
      interval: 5s
      timeout: 3s
      retries: 5

  matomo_db:
    image: mariadb:10.6
    environment:
      ACTIVATE: ${ACTIVATE_ANALYTICS}
      MYSQL_ROOT_PASSWORD: ${MATOMO_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: matomo
      MYSQL_USER: ${MATOMO_DB_USER}
      MYSQL_PASSWORD: ${MATOMO_DB_PASSWORD}
    volumes:
      - ${DATA_DIR}/matomo_db:/var/lib/mysql

  matomo:
    image: matomo:latest
    depends_on:
      - matomo_db
    environment:
      - ACTIVATE=${ACTIVATE_ANALYTICS}
      - MATOMO_DATABASE_HOST=matomo_db
      - MATOMO_DATABASE_ADAPTER=mysql
      - MATOMO_DATABASE_TABLES_PREFIX=matomo_
      - MATOMO_DATABASE_USERNAME=${MATOMO_DB_USER}
      - MATOMO_DATABASE_PASSWORD=${MATOMO_DB_PASSWORD}
      - MATOMO_DATABASE_DBNAME=matomo

    ports:
      - "8080:80"
    volumes:
      - ${DATA_DIR}/matomo:/var/www/html
      - ${PROJECT_DIR}/builds/matomo/init_sites.sh:/init_sites.sh
      - ${PROJECT_DIR}/builds/matomo/matomo_startup.sh:/matomo_startup.sh
    entrypoint: ["/bin/bash", "/matomo_startup.sh"]

  logimporter:
    image: matomo:latest
    depends_on:
      - matomo
    environment:
      - ACTIVATE=${ACTIVATE_ANALYTICS}
    volumes:
      - ${DATA_DIR}/logs/fluentd:/data/logs
      - ${PROJECT_DIR}/builds/matomo/import_script.sh:/import_script.sh
      - ${DATA_DIR}/matomo:/var/www/html
    entrypoint: ["/bin/sh", "/import_script.sh"]

  app:
    image: harbor-ada.hpc.cineca.it/meteo-hub-production/meteo-hub-ui:latest-pre

  archived_forecast_celery:
    volumes:
      - ${DATA_DIR}/arkimet_archive:/arkimet/datasets_archive
      - ${DATA_DIR}/arkimet_conf:/arkimet/config
      - ${DATA_DIR}/arkimet_archive_conf/arkimet.conf:/arkimet/config/arkimet.conf
  backend:
    volumes:
      - ${DATA_DIR}/arkimet:/arkimet/datasets
      - ${DATA_DIR}/arkimet_conf:/arkimet/config
      - ${DATA_DIR}/arkimet_archive:/arkimet/datasets_archive
      - ${DATA_DIR}/arkimet_archive_conf/arkimet.conf:/arkimet/config/arkimet.conf

networks:
  logging:
    driver: bridge
